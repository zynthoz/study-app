<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PRODUCT_NAME}} — Logo Design Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #FAFAFA;
            color: #1A1A1A;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Logo hover effects */
        .logo-card {
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-card:hover {
            transform: translateY(-4px);
        }

        .logo-canvas {
            position: relative;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Aura effect on hover */
        .logo-aura {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            transform: scale(0.5);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(40px);
            pointer-events: none;
        }

        .logo-card:hover .logo-aura {
            transform: scale(1);
            opacity: 1;
        }

        /* Divider animation */
        .divider-line {
            width: 0;
            height: 1px;
            background: #1A1A1A;
            opacity: 0.2;
            transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-card:hover .divider-line {
            width: 100%;
        }

        /* Showcase image effects */
        .showcase-img {
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border-radius: 8px;
            overflow: hidden;
        }

        .showcase-img:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        /* Typography refinements */
        .tracking-ultra-wide {
            letter-spacing: 0.2em;
        }

        .text-balance {
            text-wrap: balance;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        {{LOGO_COMPONENTS}}

        const LogoShowcase = () => {
            const logos = [
                {{LOGO_DATA}}
            ];

            return (
                <div className="min-h-screen flex flex-col items-center py-20 px-6">

                    {/* Header */}
                    <div className="text-center mb-20 max-w-3xl">
                        <h1 className="text-6xl md:text-7xl font-extralight tracking-wider mb-6">
                            {{PRODUCT_NAME}}
                        </h1>
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide mb-8">
                            {{TAGLINE}}
                        </p>
                        <div className="w-12 h-[1px] bg-[#1A1A1A] mx-auto opacity-30"></div>
                    </div>

                    {/* Logo Grid */}
                    <div className="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 mb-32">
                        {logos.map((logo, index) => (
                            <div key={index} className="flex flex-col items-center logo-card cursor-pointer">

                                {/* Logo Canvas */}
                                <div className="w-64 h-64 mb-10 flex items-center justify-center relative">
                                    <div className="logo-aura"></div>
                                    <div className="w-32 h-32 relative z-10 logo-canvas">
                                        <logo.Component />
                                    </div>
                                </div>

                                {/* Text Description */}
                                <div className="text-center w-full px-4">
                                    <h2 className="text-xl font-medium tracking-wider mb-2 uppercase">
                                        {logo.title}
                                    </h2>
                                    <h3 className="text-xs font-mono opacity-50 tracking-widest mb-6">
                                        {logo.subtitle}
                                    </h3>
                                    <p className="text-sm leading-relaxed opacity-70 text-left font-light text-balance">
                                        {logo.philosophy}
                                    </p>
                                </div>

                                {/* Bottom Divider */}
                                <div className="divider-line mt-8 mx-auto"></div>
                            </div>
                        ))}
                    </div>

                    {/* Showcase Images Section */}
                    {{SHOWCASE_SECTION}}

                    {/* Footer */}
                    <div className="mt-32 max-w-2xl text-center">
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide leading-loose">
                            Generated with Logo Generator<br/>
                            {{YEAR}}
                        </p>
                    </div>

                </div>
            );
        };

        ReactDOM.render(<LogoShowcase />, document.getElementById('root'));
    </script>

</body>
</html>
